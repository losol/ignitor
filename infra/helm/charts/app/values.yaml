api:
  replicaCount: 1
  image:
    repository: ignis-api
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  sparkSettings:
    endpoint: "http://ignis-api:8080/fhir"
    fhirRelease: "R4"
  authSettings:
    # Public-facing issuer URL advertised in the OIDC discovery document.
    # Set when the API runs behind a Gateway / proxy that terminates TLS;
    # otherwise OpenIddict derives it from Request.Host (the in-cluster
    # pod hostname) and the metadata becomes unusable to external clients.
    issuer: ""
  # Trusted-proxy allow-list for the Forwarded Headers Middleware. Required
  # when the pod sits behind a Gateway / proxy that terminates TLS so the API
  # honours X-Forwarded-Proto/For (e.g. for OAuth redirect URLs). Set the IP
  # of the proxy pod or the cluster pod CIDR. Empty lists disable the
  # middleware entirely.
  forwardedHeaders:
    knownProxies: []
    knownNetworks: []
  externalMongodbConnectionString: ""
  existingSecret: ""
  # Extra volume mounts for the API container (e.g. for certificate files)
  extraVolumeMounts: []
  # Extra volumes for the API pod (e.g. Kubernetes Secrets)
  extraVolumes: []
  # Hostnames for API HTTPRoute. Leave empty to keep the API internal-only.
  hostnames: []
  # Override the AllowedHosts allow-list passed to ASP.NET HostFiltering.
  # Defaults to `api.hostnames` when empty — tighten only if the public
  # routing hostnames differ from what Kestrel should accept. Probes are
  # configured with `Host: localhost`, which is prepended automatically.
  allowedHosts: []
  # Annotations applied to the api pod template. Used e.g. by
  # reloader.stakater.com/auto: "true" to opt the api Deployment into
  # automatic rolling restart when referenced Secrets or ConfigMaps change.
  podAnnotations: {}

web:
  enabled: true
  replicaCount: 1
  image:
    repository: ignis-web
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # Hostnames for Web HTTPRoute. Leave empty to keep the Web app internal-only.
  hostnames: []
  # Names of pre-existing Secrets whose keys become env vars on the web pod
  # (mounted via envFrom). Useful for spreading credentials across multiple
  # Secrets — e.g. one synced by External Secrets, one with the session key.
  # Typical keys: IGNIS_AUTH_ISSUER, IGNIS_WEB_APP_URL, IGNIS_WEB_CLIENT_ID,
  # IGNIS_WEB_CLIENT_SECRET, IGNIS_WEB_SESSION_SECRET, IGNIS_WEB_FHIR_BASE_URL,
  # IGNIS_WEB_FEATURES_AUTH, IGNIS_WEB_FEATURES_ADMIN.
  existingSecrets: []
  # Extra env vars to set inline (e.g. non-secret feature flags).
  # Format: list of {name, value} entries.
  extraEnv: []
  # Annotations applied to the web pod template. Same purpose as
  # api.podAnnotations.
  podAnnotations: {}

gateway:
  enabled: true
  # Name of the Gateway resource to attach HTTPRoutes to
  name: "ignis-gateway"
  # Namespace of the Gateway (if different from release namespace)
  namespace: ""
