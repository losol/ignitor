apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.api.fullname" . }}
  labels:
    {{- include "app.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "app.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app.api.selectorLabels" . | nindent 8 }}
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
      containers:
        - name: ignis-api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            {{- $allowedHosts := default .Values.api.hostnames .Values.api.allowedHosts }}
            - name: AllowedHosts
              value: {{ prepend $allowedHosts "localhost" | join ";" | quote }}
            {{- range $index, $proxy := .Values.api.forwardedHeaders.knownProxies }}
            - name: ForwardedHeaders__KnownProxies__{{ $index }}
              value: {{ $proxy | quote }}
            {{- end }}
            {{- range $index, $network := .Values.api.forwardedHeaders.knownNetworks }}
            - name: ForwardedHeaders__KnownNetworks__{{ $index }}
              value: {{ $network | quote }}
            {{- end }}
            - name: SparkSettings__Endpoint
              value: {{ .Values.api.sparkSettings.endpoint | quote }}
            - name: SparkSettings__FhirRelease
              value: {{ .Values.api.sparkSettings.fhirRelease | quote }}
            {{- if .Values.api.authSettings.issuer }}
            - name: AuthSettings__Issuer
              value: {{ .Values.api.authSettings.issuer | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.api.existingSecret | default (include "app.api.fullname" .) }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
{{- if .Values.api.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml .Values.api.extraVolumeMounts | nindent 12 }}
{{- end }}
{{- if .Values.api.extraVolumes }}
      volumes:
        {{- toYaml .Values.api.extraVolumes | nindent 8 }}
{{- end }}
