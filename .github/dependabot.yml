version: 2

updates:
  - package-ecosystem: npm
    directory: /src/Ignis.Web
    schedule:
      interval: daily
    cooldown:
      default-days: 14
    commit-message:
      prefix: "Deps (Web)"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - major
          - minor
          - patch
      react-router:
        patterns:
          - "react-router"
          - "@react-router/*"
        update-types:
          - major
          - minor
          - patch
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
        update-types:
          - major
          - minor
          - patch
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    # Pin @types/node major to the Node runtime declared in the Dockerfile
    # and CI workflow. Otherwise Dependabot would advertise types for APIs
    # that don't exist on the deployed Node version.
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 14
    commit-message:
      prefix: "Deps (Api)"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 14
    commit-message:
      prefix: "Deps (CI)"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /src/Ignis.Api
    schedule:
      interval: daily
    cooldown:
      default-days: 14
    commit-message:
      prefix: "Deps (CI)"

  - package-ecosystem: docker
    directory: /src/Ignis.Web
    schedule:
      interval: daily
    cooldown:
      default-days: 14
    commit-message:
      prefix: "Deps (CI)"

  - package-ecosystem: helm
    directory: /infra/helm
    schedule:
      interval: daily
    cooldown:
      default-days: 14
    commit-message:
      prefix: "Deps (Infra)"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
